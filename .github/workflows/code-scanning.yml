name: Code Scanning

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/code-scanning.yml'
      - 'web/src/server/**'
      - 'web/scripts/**'
      - 'web/package.json'
      - 'pnpm-lock.yaml'
      - 'AGENTS.md'
  push:
    branches: [main]
    paths:
      - '.github/workflows/code-scanning.yml'
      - 'web/src/server/**'
      - 'web/scripts/**'
      - 'web/package.json'
      - 'pnpm-lock.yaml'
      - 'AGENTS.md'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  sarif-upload:
    name: sarif-${{ matrix.engine_mode }}-${{ matrix.depth }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine_mode: baseline
            depth: standard
          - engine_mode: agentic
            depth: standard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SARIF from fixture
        run: |
          node web/scripts/generate-sarif-ci.mjs \
            --fixture web/scripts/code-scanning-fixture.json \
            --output "/tmp/confession-${{ matrix.engine_mode }}-${{ matrix.depth }}.sarif.json" \
            --engine-mode "${{ matrix.engine_mode }}" \
            --depth "${{ matrix.depth }}" \
            --max-results 5000 \
            --max-bytes 9000000

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarif-${{ matrix.engine_mode }}-${{ matrix.depth }}
          path: /tmp/confession-${{ matrix.engine_mode }}-${{ matrix.depth }}.sarif.json

      - name: Upload to GitHub Code Scanning
        if: github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: /tmp/confession-${{ matrix.engine_mode }}-${{ matrix.depth }}.sarif.json
          category: confession-${{ matrix.engine_mode }}-${{ matrix.depth }}
